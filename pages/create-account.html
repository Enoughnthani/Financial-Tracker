<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Financial Tracker</title>
  <link rel="stylesheet" href="../css/style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>
  <main class="auth-wrapper">
    <article class="auth-card">
      <a href="../index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back</a>
      <i class="fas fa-user-plus auth-icon"></i>
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join Financial Tracker and take control of your finances</p>

      <form id="signupForm">
        <article class="form-group">
          <label><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="signupName" placeholder="Enter your full name" required>
        </article>

        <article class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required>
        </article>

        <article class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="signupPassword" placeholder="Create a strong password" required>
          <small class="password-hint">Must be at least 6 characters</small>
        </article>

        <article class="form-group">
          <label><i class="fas fa-check-circle"></i> Confirm Password</label>
          <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required>
        </article>

        <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Sign Up</button>
      </form>

      <article class="divider">or</article>

      <div id="googleSignInButton"></div>

      <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
    </article>
  </main>

  <script src="../js/auth.js"></script>
</body>

</html>
