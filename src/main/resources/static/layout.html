<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Financial Tracker'">Financial Tracker</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- OFF-CANVAS SIDEBAR -->
    <!-- ============================================ -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar" aria-labelledby="sidebarLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="sidebarLabel">
                <i class="fas fa-chart-line text-primary"></i> FinTrack
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <!-- User Info -->
            <div class="text-center mb-4 p-3 bg-light rounded">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center" 
                     style="width:60px;height:60px;font-size:1.5rem;font-weight:bold;">
                    <span th:text="${session?.user?.fullName != null ? #strings.substring(session.user.fullName, 0, 1) : 'G'}">G</span>
                </div>
                <h6 class="mt-2 mb-0" th:text="${session?.user?.fullName ?: 'Guest'}">Guest</h6>
                <small class="text-muted" th:text="${session?.user?.email ?: 'guest@example.com'}">guest@example.com</small>
            </div>

            <!-- Navigation -->
            <nav class="nav flex-column">
                <a href="/dashboard" class="nav-link d-flex align-items-center gap-3" 
                   th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/dashboard')} ? 'active' : ''">
                    <i class="fas fa-chart-pie fa-lg"></i> Dashboard
                </a>
                <a href="/accounts" class="nav-link d-flex align-items-center gap-3"
                   th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/accounts')} ? 'active' : ''">
                    <i class="fas fa-university fa-lg"></i> Accounts
                    <span class="badge bg-primary rounded-pill ms-auto" th:text="${accountsCount ?: 0}">0</span>
                </a>
                <a href="/transactions" class="nav-link d-flex align-items-center gap-3"
                   th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/transactions')} ? 'active' : ''">
                    <i class="fas fa-exchange-alt fa-lg"></i> Transactions
                    <span class="badge bg-primary rounded-pill ms-auto" th:text="${transactionsCount ?: 0}">0</span>
                </a>
                <a href="/budgets" class="nav-link d-flex align-items-center gap-3"
                   th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/budgets')} ? 'active' : ''">
                    <i class="fas fa-wallet fa-lg"></i> Budgets
                </a>
                <a href="/goals" class="nav-link d-flex align-items-center gap-3"
                   th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/goals')} ? 'active' : ''">
                    <i class="fas fa-bullseye fa-lg"></i> Goals
                    <span class="badge bg-primary rounded-pill ms-auto" th:text="${goalsCount ?: 0}">0</span>
                </a>
                <a href="/reports" class="nav-link d-flex align-items-center gap-3"
                   th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/reports')} ? 'active' : ''">
                    <i class="fas fa-file-alt fa-lg"></i> Reports
                </a>
                <a href="/insights" class="nav-link d-flex align-items-center gap-3"
                   th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/insights')} ? 'active' : ''">
                    <i class="fas fa-lightbulb fa-lg"></i> Insights
                </a>
                <hr>
                <a href="/profile" class="nav-link d-flex align-items-center gap-3"
                   th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/profile')} ? 'active' : ''">
                    <i class="fas fa-user fa-lg"></i> Profile
                </a>
                <a href="/logout" class="nav-link d-flex align-items-center gap-3 text-danger">
                    <i class="fas fa-sign-out-alt fa-lg"></i> Logout
                </a>
            </nav>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MAIN CONTENT -->
    <!-- ============================================ -->
    <div class="wrapper">
        <!-- Top Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container-fluid">
                <!-- Toggle Sidebar Button -->
                <button class="btn btn-outline-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="navbar-brand ms-2 fw-bold">
                    <i class="fas fa-chart-line text-primary"></i> FinTrack
                </span>
                <div class="ms-auto d-flex align-items-center gap-3">
                    <span class="text-muted small d-none d-sm-inline">
                        <i class="fas fa-user"></i> 
                        <span th:text="${session?.user?.fullName ?: 'Guest'}">Guest</span>
                    </span>
                    <a href="/logout" class="btn btn-sm btn-outline-danger">
                        <i class="fas fa-sign-out-alt"></i>
                    </a>
                </div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="container-fluid p-4">
            <th:block th:replace="${pageContent}" />
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="/js/app.js"></script>
</body>
</html>
